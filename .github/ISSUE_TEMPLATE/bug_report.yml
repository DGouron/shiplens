name: Bug Report
description: Report a bug in Shiplens
labels: [bug]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      placeholder: Paste any relevant logs or screenshots.
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: Shiplens version
      placeholder: e.g. 0.0.1
    validations:
      required: false
